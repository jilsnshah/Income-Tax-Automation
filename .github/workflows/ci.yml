name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --exclude venv,node_modules

  # ──────────────────────────────────────────────
  # Job 2: Unit & API tests (no browser, no credentials)
  # Safe to run on every PR including forks.
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit and API tests
        run: |
          pytest tests/test_crypto_utils.py tests/test_api.py \
            -v \
            --tb=short \
            --cov=crypto_utils \
            --cov=server \
            --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ──────────────────────────────────────────────
  # Job 3: E2E login tests (Playwright, requires secrets)
  # Only runs on non-fork pushes to main where secrets are available.
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run when secrets are available (non-fork PRs)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      IT_PAN: ${{ secrets.IT_PAN }}
      IT_PASSWORD: ${{ secrets.IT_PASSWORD }}
      IT_DOB: ${{ secrets.IT_DOB }}
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run E2E login tests
        run: |
          pytest tests/test_login.py \
            -v \
            --tb=short \
            -k "test_login_page_loads or test_login_with_invalid_pan_shows_error"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: |
            **/*_error*.png
            **/login_error*.png
          if-no-files-found: ignore
